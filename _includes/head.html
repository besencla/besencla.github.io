    <style>
        /* 1. All Headers (H1 through H6) and Brand Name */
        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Lora', serif !important;
            text-transform: none !important; /* Removes blocky all-caps */
            font-weight: 600 !important;
        }

        /* 2. Specific fix for the Hero Subheader and Paragraphs */
        header.masthead p, 
        header.masthead .text-white-75,
        section p,
        .text-muted {
            font-family: 'Lora', serif !important;
            text-transform: none !important;
        }

        /* 3. Navigation Links and Buttons */
        .nav-link, 
        .btn, 
        button {
            font-family: 'Quicksand', sans-serif !important;
            text-transform: none !important;
            font-weight: 600 !important;
            letter-spacing: 1px !important;
        }

        /* 4. Navbar Specific Override */
        #mainNav .navbar-nav .nav-item .nav-link {
            font-family: 'Quicksand', sans-serif !important;
        } 

        /* Target the specific <p> tag within the header-content-inner class */
        .header-content-inner p {
            font-family: 'Lora', serif !important;
            font-size: 24px !important;
            font-style: italic;
            font-weight: 500 !important; /* Bold weight makes serif fonts readable on photos */
            color: #ffffff !important;
            margin-bottom: 50px !important; /* Adds space where the button used to be */
            
            /* SPACING: Helps it breathe against the background */
                letter-spacing: 1px;
                margin-bottom: 50px !important;

            /* THE FOCUS BOX */
            background-color: rgba(0, 0, 0, 0.05) !important; /* Semi-transparent black */
            display: inline-block; /* Ensures the box only wraps the text, not the whole screen width */
            padding: 2px 5px !important; /* Gives the text room to breathe inside the box */
            border-radius: 8px; /* Softens the corners */
            
            /* BLUR EFFECT (Optional - very modern look) */
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            
            /* TEXT SHADOW for extra crispness */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
/*            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5) !important;*/
        }

        .header-content-inner hr.celtic-knot {
            display: block !important;
            border: 0 !important;
            
            /* 1. LINK HEIGHT TO WIDTH */
            /* This creates a 'square' or 'rectangular' box that scales */
            width: 12vw !important;        /* Scales with screen width */
            height: 12vw !important;       /* Keeps aspect ratio 1:1 */
            min-width: 60px !important;    /* Mobile floor */
            min-height: 60px !important;   /* Mobile floor */
            max-width: 100px !important;   /* Desktop ceiling */
            max-height: 100px !important;  /* Desktop ceiling */
            
            /* 2. CENTER THE BOX */
            margin: 20px auto !important;

            /* 3. THE SVG */
            background-image: url("img/trinity.svg");
            background-size: contain !important; /* Forces image to fit the box */
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));

            /* 4. THE ANIMATION */
            opacity: 0;
            animation: knotFadeIn 2s ease-out 0.8s forwards !important;
        }

        @keyframes knotFadeIn {
            0% { opacity: 0; transform: scale(0.5); } /* Start small and faint */
            100% { opacity: 1; transform: scale(1); } /* End at responsive size */
        }

        /* --- Global Section Headings (H2) --- */
        /* This covers "Ancient Names", "What We Offer", "Secure Your Borders", and "Get In Touch" */
        section h2.section-heading, 
        aside.bg-dark h2, 
        #services h2.section-heading {
            font-family: 'Lora', serif !important;
            font-size: 32px !important; /* Unified Header Size */
            text-transform: none !important;
            margin-bottom: 20px !important;
            letter-spacing: 1px;
        }

        /* --- Global Sub-Headings (H3) --- */
        /* This covers "Curated Home" and "Digital Fortification" */
        #services .service-box h3 {
            font-family: 'Lora', serif !important;
            font-size: 24px !important; /* Unified Sub-header Size */
            font-weight: 700 !important;
            margin-top: 15px !important;
        }

        /* --- Global Body Text (P) --- */
        /* This creates a consistent reading experience across all sections */
        section p, 
        aside.bg-dark p, 
        .text-faded, 
        .text-muted {
            font-size: 18px !important; /* Unified Body Size */
            line-height: 1.6 !important;
            opacity: 1 !important;
        }

        /* Specific contrast tweaks */
        aside.bg-dark p, .bg-primary p { color: #ffffff !important; }
        #services p, #contact p { color: #555555 !important; }

        footer.bg-dark {
            padding: 40px 0 !important;
            background-color: #111111 !important; /* Slightly darker than the CTA bar */
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .copyright-text {
            font-size: 14px !important; /* Small but readable for legal text */
            color: rgba(255, 255, 255, 0.5) !important;
            letter-spacing: 1px;
            line-height: 1.8;
        }

        .copyright-text .motto {
            font-family: 'Lora', serif;
            font-style: italic;
            color: #f05f40; /* Besenclā Orange */
            font-size: 16px;
        }
    </style>
