    <style>
        /* 1. All Headers (H1 through H6) and Brand Name */
        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Lora', serif !important;
            text-transform: none !important; /* Removes blocky all-caps */
            font-weight: 600 !important;
        }

        /* 2. Specific fix for the Hero Subheader and Paragraphs */
        header.masthead p, 
        header.masthead .text-white-75,
        section p,
        .text-muted {
            font-family: 'Lora', serif !important;
            text-transform: none !important;
        }

        /* 3. Navigation Links and Buttons */
        .nav-link, 
        .btn, 
        button {
            font-family: 'Quicksand', sans-serif !important;
            text-transform: none !important;
            font-weight: 600 !important;
            letter-spacing: 1px !important;
        }

        /* 4. Navbar Specific Override */
        #mainNav .navbar-nav .nav-item .nav-link {
            font-family: 'Quicksand', sans-serif !important;
        } 

        /* Target the specific <p> tag within the header-content-inner class */
        .header-content-inner p {
            font-family: 'Lora', serif !important;
            font-weight: 600 !important; /* Bold weight makes serif fonts readable on photos */
            color: #ffffff !important;
            
            /* THE FOCUS BOX */
            background-color: rgba(0, 0, 0, 0.05) !important; /* Semi-transparent black */
            display: inline-block; /* Ensures the box only wraps the text, not the whole screen width */
            padding: 5px 10px !important; /* Gives the text room to breathe inside the box */
            border-radius: 8px; /* Softens the corners */
            
            /* BLUR EFFECT (Optional - very modern look) */
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            
            /* TEXT SHADOW for extra crispness */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5) !important;
        }

        .header-content-inner hr.celtic-knot {
            display: block !important;
            border: 0 !important;
            
            /* 1. LINK HEIGHT TO WIDTH */
            /* This creates a 'square' or 'rectangular' box that scales */
            width: 12vw !important;        /* Scales with screen width */
            height: 12vw !important;       /* Keeps aspect ratio 1:1 */
            min-width: 60px !important;    /* Mobile floor */
            min-height: 60px !important;   /* Mobile floor */
            max-width: 100px !important;   /* Desktop ceiling */
            max-height: 100px !important;  /* Desktop ceiling */
            
            /* 2. CENTER THE BOX */
            margin: 20px auto !important;

            /* 3. THE SVG */
            background-image: url("img/trinity.svg");
            background-size: contain !important; /* Forces image to fit the box */
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));

            /* 4. THE ANIMATION */
            opacity: 0;
            animation: knotFadeIn 2s ease-out 0.8s forwards !important;
        }

        @keyframes knotFadeIn {
            0% { opacity: 0; transform: scale(0.5); } /* Start small and faint */
            100% { opacity: 1; transform: scale(1); } /* End at responsive size */
        }

        .bg-primary .text-faded {
            /* 1. Balanced Size */
            font-size: 20px !important; 
            
            /* 2. Clean, solid white */
            color: #ffffff !important;
            opacity: 1 !important;
            
            /* 3. Comfortable spacing */
            line-height: 1.6 !important;
            
            /* 4. Keeps the text from stretching too wide on desktop */
            max-width: 750px !important;
            margin: 0 auto 30px auto !important;
            
            /* 5. Minimal shadow for depth */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2) !important;
        }

        /* Adjusting the heading to be proportional */
        .bg-primary .section-heading {
            font-size: 2.8rem !important;
            margin-bottom: 20px !important;
        }

        #services .service-box h3 {
            font-family: 'Lora', serif; /* Matching your subheader */
            font-weight: 700;
            margin-top: 20px;
        }

        #services .service-box p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #555 !important; /* Slightly darker than 'muted' for better reading */
        }

        #services .text-primary {
            color: #f05f40 !important; /* Ensuring your specific orange is used */
        }

        /* Target the black bar specifically */
        aside.bg-dark {
            padding: 80px 0 !important;
            background-color: #1a1a1a !important;
        }

        /* Make the "Secure Your Borders" title larger */
        aside.bg-dark h2 {
            font-family: 'Lora', serif !important;
            font-size: 32px !important; /* Fixed pixel size for reliability */
            color: #ffffff !important;
            margin-bottom: 20px !important;
            text-transform: none !important;
        }

        /* Make the description text match the 'About' section size */
        aside.bg-dark p {
            font-size: 20px !important; /* Matches your About section "Goldilocks" zone */
            color: rgba(255, 255, 255, 0.9) !important;
            line-height: 1.6 !important;
            max-width: 700px !important;
            margin: 0 auto 30px auto !important;
            opacity: 1 !important;
        }

        /* Ensure the button is prominent */
        aside.bg-dark .btn-xl {
            font-size: 18px !important;
            padding: 15px 30px !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
