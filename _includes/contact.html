<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 text-center">
                <h2 class="section-heading">Let Us Watch the Gate</h2>
                <hr class="primary">
                <p>The defense of the hearth is a shared journey. Reach out to discuss how we can help fortify your digital and physical borders.</p>
            </div>
            <div style="max-width: 600px; margin: 0 auto;">
                <div class="col-xs-6 text-center">
                    <a href="mailto:{{ site.email }}">
                    <i class="fa fa-envelope-o fa-3x wow bounceIn sr-contact" data-wow-delay=".1s"></i>
                        <p>{{ site.email }}</p>
                    </a>
                </div>
                <div class="col-xs-6 text-center">
                    <a href="tel:{{ site.phone_intl }}">
                    <i class="fa fa-phone fa-3x wow bounceIn sr-contact" data-wow-delay=".1s"></i>
                        <p>{{ site.phone_us }}</p>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
